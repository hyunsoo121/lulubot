services:
  app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./public/screenshots:/app/public/screenshots
    depends_on:
      - redis
    networks:
      - lulubot-net

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - lulubot-net

networks:
  lulubot-net:
    driver: bridge

volumes:
  redis_data:
